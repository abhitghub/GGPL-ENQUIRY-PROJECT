[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gasket-quote-packages"
version = "0.1.0"
description = "Shared GGPL gasket quote business logic packages."
requires-python = ">=3.10"
dependencies = [
  "openpyxl>=3.1.0",
  "pandas>=2.0.0",
  "openai>=1.0.0",
  "xlsxwriter>=3.1.0",
  "redis>=5.0.0",
  "reportlab>=4.0.0",
  "pdfplumber>=0.10.0",
  "pydantic>=2.0.0",
  "supabase>=2.0.0",
]

[tool.setuptools]
packages = ["core", "data", "domain", "services"]

[tool.setuptools.package-data]
data = ["reference/*"]
